name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # verilog/ および examples/ の Verilog を syntax + lint チェック (Docker 抜きで素早く)
  lint-rtl:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Verilator lint-only
        run: |
          # verilog/ および examples/*/verilog/ 配下の Verilog に --lint-only。
          # サブモジュール (hoglet/) は upstream 管理なので対象外。
          for v in verilog/*.v verilog/*.sv examples/*/verilog/*.v examples/*/verilog/*.sv; do
            [ -e "$v" ] || continue
            dir=$(dirname "$v")
            # サブモジュール依存があるトップは単体 lint 不可のためスキップ
            [[ "$v" == *"/04-6502/"* ]] && continue
            verilator --lint-only -Wall -Wno-DECLFILENAME -I"$dir" "$v"
          done

  # build-firmware は Pico SDK 実装が揃ってから有効化予定（現在は compose.yml に firmware サービスなし）
