<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>06-8080 CP/M 2.2 — rtlscope</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <style>
    body { background:#f5f5f5; color:#111; font-family:monospace; margin:20px; }
    h2   { margin:0 0 8px; font-size:16px; color:#333; }
    button { background:#e8e8e8; color:#111; border:1px solid #aaa; padding:4px 14px; cursor:pointer; }
    button:hover { background:#d0d0d0; }
    label { font-size:12px; color:#555; }
    canvas { display:block; border:1px solid #bbb; }

    /* ---- Drive panel ---- */
    .drives-panel { margin-bottom:6px; }
    .drive-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; font-size:12px; }
    .drive-lbl  { color:#444; width:18px; text-align:right; flex-shrink:0; }
    .drive-name {
      color:#111; width:180px; background:#fff; padding:2px 6px;
      border:1px solid #bbb; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .btn-load {
      background:#e8e8e8; color:#333; border:1px solid #aaa;
      padding:2px 8px; cursor:pointer; font-size:12px;
    }
    .btn-load:hover { background:#d0d0d0; }
    .btn-save {
      background:#e8e8e8; color:#999; border:1px solid #ccc;
      padding:2px 8px; cursor:pointer; font-size:12px;
    }
    .btn-save.dirty { color:#2a8a2a; border-color:#4a9a4a; }
    .btn-save.dirty:hover { background:#c8e8c8; }
    .btn-dl {
      background:#e8e8e8; color:#555; border:1px solid #ccc;
      padding:2px 6px; cursor:pointer; font-size:12px;
    }
    .btn-dl:hover { background:#d0d0d0; }

    /* ---- Presets ---- */
    .presets { margin-bottom:8px; font-size:12px; color:#444; display:flex; align-items:center; gap:8px; }
    .presets button { padding:2px 10px; font-size:12px; }

    /* ---- Terminal themes ---- */
    .btn-theme { padding:2px 9px; font-size:12px; cursor:pointer; border:2px solid transparent; }
    .btn-theme[data-theme="green"] { background:#000; color:#33FF00; border-color:#444; }
    .btn-theme[data-theme="amber"] { background:#000; color:#FFB300; border-color:#444; }
    .btn-theme[data-theme="paper"] { background:#000; color:#E8E8D0; border-color:#444; }
    .btn-theme[data-theme="light"] { background:#e8e8e8; color:#111; border:2px solid #aaa; }
    .btn-theme.active { border-color:#0077cc !important; }

    /* ---- Controls ---- */
    .controls { display:flex; align-items:center; gap:14px; margin-bottom:8px; flex-wrap:wrap; }

    /* ---- Main layout ---- */
    .main-row { display:flex; gap:12px; align-items:flex-start; margin-bottom:4px; }
    #terminal-wrap { border:1px solid #bbb; flex-shrink:0; transition:border-color .15s, box-shadow .15s; }
    #terminal-wrap.drop-active { border-color:#0077cc; box-shadow:0 0 10px #0077cc55; }
    #drop-hint   { font-size:11px; color:#888; margin-bottom:4px; }
    #drop-status { font-size:11px; min-height:14px; margin-bottom:4px; transition:opacity .5s; }
    #reg-panel {
      border:1px solid #bbb; padding:10px 12px;
      font-size:12px; color:#333; width:230px; flex-shrink:0;
      display:flex; flex-direction:column;
    }
    #reg-panel h3    { font-size:11px; color:#888; margin:0 0 4px; padding-bottom:4px; border-bottom:1px solid #ccc; }
    #reg-panel .val  { color:#111; font-weight:bold; font-size:13px; }
    #reg-panel .label{ color:#888; }
    #fs-list { margin-top:2px; overflow-y:auto; flex:1; }
    /* FS table: 名前 | サイズ | 時刻 */
    .fs-thead, .fs-row {
      display:grid;
      grid-template-columns:1fr 36px 62px;
      gap:0 4px;
      align-items:baseline;
    }
    .fs-thead {
      font-size:10px; color:#666;
      border-bottom:2px solid #bbb;
      padding-bottom:2px; margin-bottom:1px;
    }
    .fs-th {
      cursor:pointer; user-select:none;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .fs-th:hover { color:#111; }
    .fs-th.active { color:#0055aa; }
    .fs-row { padding:2px 0; border-bottom:1px solid #e0e0e0; cursor:default; }
    .fs-row:hover .fs-name { color:#0066cc; }
    .fs-name { color:#0055aa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:12px; }
    .fs-sz   { color:#888; font-size:10px; text-align:right; white-space:nowrap; }
    .fs-mt   { color:#888; font-size:10px; text-align:right; white-space:nowrap; }
    .sig-label { font-size:11px; color:#888; margin-bottom:2px; }
  </style>
</head>
<body>
  <h2>06 — Intel 8080 / CP/M 2.2 RTL Simulator</h2>
  <p style="font-size:12px;color:#666;margin:0 0 8px;">vm80a (デキャップ起こし RTL) → Verilator → WASM &nbsp;|&nbsp; CP/M 2.2 + カスタム BIOS</p>

  <!-- Drive panel (A–D) -->
  <div class="drives-panel" id="drives-panel"></div>

  <!-- Quick presets -->
  <div class="presets">
    プリセット:
    <button onclick="loadPreset(0)">CP/M 標準</button>
    <button onclick="loadPreset(1)">BDS C</button>
    <button onclick="loadPreset(2)">ブランク</button>
  </div>

  <div class="controls">
    <button id="btn-run">Pause</button>
    <button id="btn-reset">Reset</button>
    <label>速度: <input id="speed" type="range" min="100" max="100000" step="100" value="100000"></label>
    <span id="cycle-info" style="font-size:12px;color:#555;">0 cycles</span>
    <span style="font-size:12px;color:#555;">テーマ:</span>
    <button class="btn-theme" data-theme="green" title="緑リン光体 (P39)">緑</button>
    <button class="btn-theme" data-theme="amber" title="アンバーリン光体 (P3)">アンバー</button>
    <button class="btn-theme" data-theme="paper" title="白リン光体 (P4)">白</button>
    <button class="btn-theme" data-theme="light" title="ライト（現代）">ライト</button>
  </div>

  <div id="drop-hint">ターミナルにファイルをドロップ → WASM FS に書き込み → CP/M で <b>R ファイル名</b> で転送</div>
  <div id="drop-status"></div>
  <div class="main-row">
    <div id="terminal-wrap"><div id="terminal"></div></div>
    <div id="reg-panel">
      <h3>CPU</h3>
      <div style="margin-bottom:10px;line-height:2.2;">
        <span class="label">PC : </span><span class="val" id="r-pc">----</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #ccc;">
        <span style="font-size:11px;color:#888;">WASM FS</span>
        <button id="btn-save-fs" class="btn-dl" style="padding:1px 6px;font-size:10px;" title="WASM FSをIndexedDBに保存">保存</button>
      </div>
      <div id="fs-list"></div>
    </div>
  </div>

  <div class="sig-label">I/O Bus Analyzer (port / data / io_req / io_wr)</div>
  <canvas id="la" width="900" height="120"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script>
  // ---- Logic Analyzer ----
  const LA_SIGNALS = [
    { label:'port',   bit:0,  type:'hex', width:8, color:'#0077cc' },
    { label:'data',   bit:16, type:'hex', width:8, color:'#009900' },
    { label:'io_req', bit:24, type:'bit', width:1, color:'#cc7700' },
    { label:'io_wr',  bit:25, type:'bit', width:1, color:'#cc3333' },
  ];
  const LA_H=120, LA_W=900, LABEL_W=56, VIEW_W=LA_W-LABEL_W;
  const TRACK_H = LA_H / LA_SIGNALS.length;

  function drawLA(ctx, heapu32, ringBase, head, ringSize) {
    ctx.fillStyle='#f5f5f5'; ctx.fillRect(0,0,LA_W,LA_H);
    const samples = Math.min(head, VIEW_W, ringSize);
    const startSamp = head - samples;
    for (let t=0; t<LA_SIGNALS.length; t++) {
      const sig=LA_SIGNALS[t], yBase=t*TRACK_H;
      const MASK=(sig.width<32)?((1<<sig.width)-1):0xFFFFFFFF;
      ctx.strokeStyle='#ccc'; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.moveTo(0,yBase+TRACK_H); ctx.lineTo(LA_W,yBase+TRACK_H); ctx.stroke();
      ctx.fillStyle='#888'; ctx.font='10px monospace'; ctx.textAlign='left';
      ctx.fillText(sig.label, 3, yBase+TRACK_H*0.65);
      if (!samples) continue;
      const getWord = i => heapu32[ringBase+((startSamp+i)&(ringSize-1))];
      if (sig.type==='bit') {
        const yHigh=yBase+4, yLow=yBase+TRACK_H-4;
        ctx.strokeStyle=sig.color; ctx.lineWidth=1.5; ctx.beginPath();
        ctx.moveTo(LABEL_W, (getWord(0)>>sig.bit)&1 ? yHigh : yLow);
        for (let i=0; i<samples; i++) {
          const v=(getWord(i)>>sig.bit)&1, x=LABEL_W+i, y=v?yHigh:yLow;
          ctx.lineTo(x,y); ctx.lineTo(x+1,y);
        }
        ctx.stroke();
      } else {
        const yTop=yBase+4, yMid=yBase+TRACK_H/2, yBot=yBase+TRACK_H-4;
        let pv=(getWord(0)>>sig.bit)&MASK, ss=LABEL_W, segs=[];
        for (let i=1; i<samples; i++) {
          const v=(getWord(i)>>sig.bit)&MASK;
          if (v!==pv) { segs.push({x:ss,w:LABEL_W+i-ss,val:pv}); ss=LABEL_W+i; pv=v; }
        }
        segs.push({x:ss,w:LABEL_W+samples-ss,val:pv});
        ctx.lineWidth=1;
        for (const s of segs) {
          ctx.strokeStyle=sig.color;
          [[yTop,yTop],[yBot,yBot],[yTop,yBot],[yTop,yBot]].forEach(([y1,y2],i)=>{
            ctx.beginPath();
            if (i<2) { ctx.moveTo(s.x,y1); ctx.lineTo(s.x+s.w,y1); }
            else if (i===2) { ctx.moveTo(s.x,yTop); ctx.lineTo(s.x,yBot); }
            else { ctx.moveTo(s.x+s.w,yTop); ctx.lineTo(s.x+s.w,yBot); }
            ctx.stroke();
          });
          if (s.w>24) {
            ctx.fillStyle=sig.color; ctx.font='9px monospace'; ctx.textAlign='center';
            ctx.fillText('0x'+s.val.toString(16).toUpperCase().padStart(2,'0'), s.x+s.w/2, yMid+3);
          }
        }
      }
    }
  }

  // ---- Drive management ----
  const DRIVE_LABELS = ['A','B','C','D'];
  // Preset names shown in the UI (matches sim_init_disk ids)
  const PRESET_NAMES = [
    ['cpm22.dsk', '(blank)', '(blank)', '(blank)'],
    ['cpm22.dsk', 'bdsc.dsk', '(blank)', '(blank)'],
    ['(blank)',   '(blank)',  '(blank)', '(blank)'],
  ];

  let curPreset   = 0;
  let diskNames   = PRESET_NAMES[0].slice();
  let customDisks = [null, null, null, null]; // Uint8Array | null
  let moduleReady = false;
  let running     = true;

  // ---- WASM FS ファイルリスト ----
  function fmtSize(n) {
    if (n >= 1024) return (n >> 10) + 'K';
    return n + 'B';
  }

  function fmtMtime(mtime) {
    return new Date(mtime * 1000).toLocaleTimeString(undefined, { hour12: false });
  }

  function fmtHz(hz) {
    var mhz = Math.floor(hz / 1000000);
    var khz = Math.floor((hz % 1000000) / 1000);
    var h   = Math.floor(hz % 1000);
    if (mhz > 0)
      return mhz + ',' + String(khz).padStart(3,'0') + ',' + String(h).padStart(3,'0') + ' Hz';
    if (khz > 0)
      return khz + ',' + String(h).padStart(3,'0') + ' Hz';
    return h + ' Hz';
  }

  var fsSort = { col: 'name', asc: true };

  function updateFSList() {
    if (!moduleReady) return;
    var el = document.getElementById('fs-list');
    try {
      var entries = [];
      Module.FS.readdir('/').forEach(function(f) {
        if (f === '.' || f === '..') return;
        try {
          var st = Module.FS.stat('/' + f);
          if (Module.FS.isDir(st.mode)) return;
          if (st.size >= 65536) return;
          entries.push({ name: f, size: st.size, mtime: st.mtime });
        } catch(e) {}
      });

      entries.sort(function(a, b) {
        var v;
        if      (fsSort.col === 'size')  v = a.size  - b.size;
        else if (fsSort.col === 'mtime') v = a.mtime - b.mtime;
        else                             v = a.name.localeCompare(b.name);
        return fsSort.asc ? v : -v;
      });

      if (!entries.length) {
        el.innerHTML = '<div style="color:#aaa;font-size:11px;">(空)</div>';
        return;
      }

      var COLS = [
        { key:'name',  label:'名前' },
        { key:'size',  label:'サイズ' },
        { key:'mtime', label:'時刻' },
      ];
      var arrow = { asc:' ↑', desc:' ↓' };
      var thead = '<div class="fs-thead">' +
        COLS.map(function(c) {
          var a = (fsSort.col === c.key) ? (fsSort.asc ? arrow.asc : arrow.desc) : '';
          return '<span class="fs-th' + (fsSort.col===c.key?' active':'') +
                 '" data-col="' + c.key + '">' + c.label + a + '</span>';
        }).join('') + '</div>';

      var rows = entries.map(function(e) {
        return '<div class="fs-row" title="R ' + e.name + '">' +
          '<span class="fs-name">' + e.name + '</span>' +
          '<span class="fs-sz">'  + fmtSize(e.size) + '</span>' +
          '<span class="fs-mt">'  + fmtMtime(e.mtime) + '</span>' +
          '</div>';
      }).join('');

      el.innerHTML = thead + rows;

      el.querySelectorAll('.fs-th').forEach(function(th) {
        th.addEventListener('click', function() {
          var col = this.getAttribute('data-col');
          if (fsSort.col === col) fsSort.asc = !fsSort.asc;
          else { fsSort.col = col; fsSort.asc = true; }
          updateFSList();
        });
      });
    } catch(e) { el.textContent = '(取得失敗)'; }
  }

  function buildDrivesPanel() {
    const panel = document.getElementById('drives-panel');
    panel.innerHTML = '';
    for (let d = 0; d < 4; d++) {
      const row = document.createElement('div');
      row.className = 'drive-row';
      row.innerHTML =
        '<span class="drive-lbl">' + DRIVE_LABELS[d] + ':</span>' +
        '<span class="drive-name" id="dn-' + d + '">' + diskNames[d] + '</span>' +
        '<label class="btn-load" title="ディスクイメージを読み込む">' +
          '読込<input type="file" id="fu-' + d + '" accept=".dsk,.img" style="display:none">' +
        '</label>' +
        '<button class="btn-save" id="sv-' + d + '" title="ブラウザに保存 (IndexedDB)">保存</button>' +
        '<button class="btn-dl"   id="dl-' + d + '" title="ファイルにダウンロード">↓</button>';
      panel.appendChild(row);

      (function(drive) {
        document.getElementById('fu-' + drive).addEventListener('change', async function() {
          if (!this.files.length) return;
          const file = this.files[0];
          const buf  = await file.arrayBuffer();
          customDisks[drive] = new Uint8Array(buf);
          diskNames[drive]   = file.name;
          document.getElementById('dn-' + drive).textContent = file.name;
          if (moduleReady) applyOneDisk(drive);
          this.value = ''; // allow re-selecting same file
        });
        document.getElementById('sv-' + drive).addEventListener('click', function() {
          if (moduleReady) idbSaveDisk(drive);
        });
        document.getElementById('dl-' + drive).addEventListener('click', function() {
          if (moduleReady) downloadDisk(drive);
        });
      })(d);
    }
  }

  function applyOneDisk(drive) {
    if (!customDisks[drive]) return;
    const arr = customDisks[drive];
    const ptr = Module._malloc(arr.length);
    Module.HEAPU8.set(arr, ptr);
    Module._load_disk_drive(drive, ptr, arr.length);
    Module._free(ptr);
  }

  function applyCustomDisks() {
    for (let d = 0; d < 4; d++) applyOneDisk(d);
  }

  function loadPreset(id) {
    customDisks = [null, null, null, null];
    diskNames   = PRESET_NAMES[id].slice();
    curPreset   = id;
    for (let d = 0; d < 4; d++)
      document.getElementById('dn-' + d).textContent = diskNames[d];
    if (!moduleReady) return;
    Module._sim_init_disk(id);
    running = false;
    document.getElementById('btn-run').textContent = 'Run';
    term.reset(); term.focus();
    for (let d = 0; d < 4; d++) updateDirtyBtn(d);
  }

  function downloadDisk(drive) {
    const ptr  = Module._sim_get_disk_ptr(drive) >>> 0;
    const size = Module._sim_get_disk_size(drive);
    const data = new Uint8Array(Module.HEAPU8.buffer, ptr, size);
    const blob = new Blob([data], {type:'application/octet-stream'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.style.display = 'none';
    a.href     = url;
    a.download = diskNames[drive] === '(blank)'
      ? ('drive' + DRIVE_LABELS[drive] + '.dsk')
      : diskNames[drive];
    document.body.appendChild(a);
    a.click();
    setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
  }

  function updateDirtyBtn(drive) {
    const btn = document.getElementById('sv-' + drive);
    if (!btn || !moduleReady) return;
    btn.classList.toggle('dirty', !!Module._sim_get_disk_dirty(drive));
  }

  // ---- IndexedDB ----
  function openCpmDB() {
    return new Promise(function(resolve, reject) {
      var req = indexedDB.open('cpm-disks', 2);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('disks'))
          db.createObjectStore('disks', { keyPath: 'drive' });
        if (!db.objectStoreNames.contains('fs'))
          db.createObjectStore('fs', { keyPath: 'name' });
      };
      req.onsuccess = function(e) { resolve(e.target.result); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  }

  function idbSaveFS() {
    if (!moduleReady) return;
    var entries = [];
    try {
      Module.FS.readdir('/').forEach(function(f) {
        if (f === '.' || f === '..') return;
        try {
          var st = Module.FS.stat('/' + f);
          if (Module.FS.isDir(st.mode)) return;
          if (st.size >= 65536) return;
          entries.push({ name: f, data: Module.FS.readFile('/' + f) });
        } catch(e) {}
      });
    } catch(e) { console.error('[IDB] FS read failed', e); return; }
    openCpmDB().then(function(db) {
      var tx = db.transaction('fs', 'readwrite');
      var store = tx.objectStore('fs');
      store.clear();
      entries.forEach(function(e) { store.put(e); });
      tx.oncomplete = function() {
        console.log('[IDB] WASM FS saved (' + entries.length + ' files)');
      };
      tx.onerror = function(e) { console.error('[IDB] FS save error', e.target.error); };
    }).catch(function(e) { console.error('[IDB] open error', e); });
  }

  function idbRestoreFS() {
    return new Promise(function(resolve, reject) {
      openCpmDB().then(function(db) {
        var req = db.transaction('fs', 'readonly').objectStore('fs').getAll();
        req.onsuccess = function(e) { resolve(e.target.result || []); };
        req.onerror   = function(e) { reject(e.target.error); };
      }).catch(reject);
    });
  }

  function idbSaveDisk(drive) {
    if (!moduleReady) return;
    var ptr  = Module._sim_get_disk_ptr(drive) >>> 0;
    var size = Module._sim_get_disk_size(drive);
    var data = new Uint8Array(Module.HEAPU8.buffer, ptr, size).slice();
    var name = diskNames[drive];
    openCpmDB().then(function(db) {
      var tx = db.transaction('disks', 'readwrite');
      tx.objectStore('disks').put({ drive: drive, data: data, name: name });
      tx.oncomplete = function() {
        Module._sim_clear_disk_dirty(drive);
        updateDirtyBtn(drive);
        console.log('[IDB] drive ' + DRIVE_LABELS[drive] + ': saved (' + name + ')');
      };
      tx.onerror = function(e) { console.error('[IDB] save error', e.target.error); };
    }).catch(function(e) { console.error('[IDB] open error', e); });
  }

  function idbRestoreAll() {
    return new Promise(function(resolve, reject) {
      openCpmDB().then(function(db) {
        var req = db.transaction('disks', 'readonly').objectStore('disks').getAll();
        req.onsuccess = function(e) { resolve(e.target.result || []); };
        req.onerror   = function(e) { reject(e.target.error); };
      }).catch(reject);
    });
  }

  buildDrivesPanel();

  // ---- Terminal themes ----
  var THEMES = {
    green: { background:'#000000', foreground:'#33FF00', cursor:'#33FF00',
             selectionBackground:'#33FF0055', cursorAccent:'#000000' },
    amber: { background:'#000000', foreground:'#FFB300', cursor:'#FFB300',
             selectionBackground:'#FFB30055', cursorAccent:'#000000' },
    paper: { background:'#000000', foreground:'#E8E8D0', cursor:'#E8E8D0',
             selectionBackground:'#E8E8D055', cursorAccent:'#000000' },
    light: { background:'#ffffff', foreground:'#111111', cursor:'#111111',
             selectionBackground:'#0077cc40', cursorAccent:'#ffffff' },
  };

  var currentTheme = localStorage.getItem('cpm-theme') || 'green';

  function applyTheme(name) {
    if (!THEMES[name]) return;
    currentTheme = name;
    localStorage.setItem('cpm-theme', name);
    if (term) term.options.theme = THEMES[name];
    var wrap = document.getElementById('terminal-wrap');
    wrap.style.background   = THEMES[name].background;
    wrap.style.borderColor  = (name === 'light') ? '#bbb' : '#444';
    document.querySelectorAll('.btn-theme').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.theme === name);
    });
  }

  document.querySelectorAll('.btn-theme').forEach(function(btn) {
    btn.addEventListener('click', function() { applyTheme(this.dataset.theme); });
  });

  // ---- Emscripten Module ----
  var term;
  var Module = {
    onRuntimeInitialized: function () {
      moduleReady = true;
      term = new Terminal({
        cols:80, rows:24,
        theme: THEMES[currentTheme],
        fontSize:13, fontFamily:'Courier New, monospace',
        cursorBlink:true, convertEol:true,
      });
      term.open(document.getElementById('terminal'));
      applyTheme(currentTheme);

      const RING_SIZE = Module._get_ring_size();
      const ringBase  = Module._get_ring_ptr() >>> 2;
      const laCanvas  = document.getElementById('la');
      const laCtx     = laCanvas.getContext('2d');

      Module._sim_init_disk(curPreset);
      updateFSList();

      var cmdHistory = [], histIdx = -1, inputBuf = '';

      function clearCurrentInput() {
        for (var j = 0; j < inputBuf.length; j++) Module._send_key(0x08);
        inputBuf = '';
      }

      function navigateHistory(dir) {
        if (!cmdHistory.length) return;
        if (histIdx === -1) {
          if (dir < 0) histIdx = cmdHistory.length - 1;
          else return;
        } else {
          histIdx += dir;
          if (histIdx < 0) { histIdx = 0; return; }
          if (histIdx >= cmdHistory.length) {
            clearCurrentInput();
            histIdx = -1;
            return;
          }
        }
        var entry = cmdHistory[histIdx];
        clearCurrentInput();
        for (var j = 0; j < entry.length; j++) Module._send_key(entry.charCodeAt(j));
        inputBuf = entry;
      }

      term.onData(function(data) {
        var i = 0;
        while (i < data.length) {
          // ESC[ シーケンス（矢印キー）
          if (data[i] === '\x1b' && i+2 < data.length && data[i+1] === '[') {
            var seq = data[i+2];
            if (seq === 'A') { navigateHistory(-1); i += 3; continue; }
            if (seq === 'B') { navigateHistory(1);  i += 3; continue; }
            i += 3; continue; // 左右など他のエスケープは CP/M に渡さない
          }
          var code = data.charCodeAt(i);
          // シャドウバッファ更新
          if (data[i] === '\r') {
            if (inputBuf.trim()) {
              cmdHistory.push(inputBuf);
              if (cmdHistory.length > 100) cmdHistory.shift();
            }
            histIdx = -1; inputBuf = '';
          } else if (data[i] === '\x7f' || data[i] === '\x08') {
            if (inputBuf.length > 0) inputBuf = inputBuf.slice(0, -1);
          } else if (code >= 0x20 && code < 0x80) {
            inputBuf += data[i]; histIdx = -1;
          } else if (data[i] === '\x03' || data[i] === '\x1a') {
            histIdx = -1; inputBuf = ''; // Ctrl+C / Ctrl+Z でリセット
          }
          Module._send_key(code);
          i++;
        }
      });

      function drainDisplay() {
        let out='', ch;
        while ((ch=Module._get_display_char()) !== -1) out += String.fromCharCode(ch&0x7F);
        if (out) term.write(out);
      }

      let frameCount = 0;
      let freqHead0 = 0, freqTime0 = performance.now(), freqDisp = '';

      function loop() {
        if (running) {
          const steps = parseInt(document.getElementById('speed').value);
          try {
            for (let i=0; i<steps; i++) Module._step();
          } catch(e) {
            console.error('[WASM] step() threw:', e);
            running = false;
            document.getElementById('btn-run').textContent = 'Run';
          }
        }
        drainDisplay();

        const head = Module._get_head() >>> 0;
        document.getElementById('r-pc').textContent =
          (Module._get_pc()>>>0).toString(16).toUpperCase().padStart(4,'0');

        frameCount++;
        if (frameCount % 60 === 0) {
          const now = performance.now();
          const dc  = (head - freqHead0) >>> 0; // 32bit wraparound 対応
          const dt  = now - freqTime0;
          freqDisp  = running && dt > 0 ? fmtHz(Math.round(dc / (dt / 1000))) : '停止中';
          freqHead0 = head;
          freqTime0 = now;
          for (let d=0; d<4; d++) updateDirtyBtn(d);
        }
        document.getElementById('cycle-info').textContent = freqDisp;

        drawLA(laCtx, Module.HEAPU32, ringBase, head, RING_SIZE);
        requestAnimationFrame(loop);
      }

      document.getElementById('btn-run').addEventListener('click', function() {
        running = !running;
        this.textContent = running ? 'Pause' : 'Run';
      });

      document.getElementById('btn-reset').addEventListener('click', function() {
        Module._sim_init_disk(curPreset);
        applyCustomDisks();
        running = false;
        document.getElementById('btn-run').textContent = 'Run';
        term.reset(); term.focus();
        for (let d=0; d<4; d++) updateDirtyBtn(d);
      });

      // ---- ファイルドロップ ----
      var dropWrap   = document.getElementById('terminal-wrap');
      var dropStatus = document.getElementById('drop-status');
      var dropFadeTimer = null;

      function showDropStatus(msg, ok) {
        dropStatus.style.opacity = '1';
        dropStatus.style.color   = ok ? '#2a8a2a' : '#cc3333';
        dropStatus.textContent   = msg;
        clearTimeout(dropFadeTimer);
        dropFadeTimer = setTimeout(function() { dropStatus.style.opacity = '0'; }, 4000);
      }

      dropWrap.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
        dropWrap.classList.add('drop-active');
      });
      dropWrap.addEventListener('dragleave', function(e) {
        if (!dropWrap.contains(e.relatedTarget))
          dropWrap.classList.remove('drop-active');
      });
      dropWrap.addEventListener('drop', function(e) {
        e.preventDefault();
        dropWrap.classList.remove('drop-active');
        var files = e.dataTransfer.files;
        if (!files.length) return;
        var msgs = [];
        var remaining = files.length;
        for (var fi = 0; fi < files.length; fi++) {
          (function(file) {
            var name = file.name.toUpperCase();
            var reader = new FileReader();
            reader.onload = function(ev) {
              try {
                Module.FS.writeFile('/' + name, new Uint8Array(ev.target.result));
                msgs.push(name + ' (' + file.size + 'B) ✓');
              } catch(err) {
                msgs.push(name + ': ERROR ' + err.message);
              }
              if (--remaining === 0) {
                showDropStatus(msgs.join('  '), msgs.every(function(m){ return m.indexOf('ERROR')<0; }));
                updateFSList();
              }
            };
            reader.readAsArrayBuffer(file);
          })(files[fi]);
        }
      });

      term.focus();
      requestAnimationFrame(loop);

      document.getElementById('btn-save-fs').addEventListener('click', function() {
        idbSaveFS();
      });

      // 起動時復元（200ms 遅延でターミナル描画後に確認ダイアログを出す）
      setTimeout(function() {
        // FS 復元（サイレント）
        idbRestoreFS().then(function(files) {
          if (!files.length) return;
          files.forEach(function(f) {
            try { Module.FS.writeFile('/' + f.name, f.data); } catch(e) {}
          });
          updateFSList();
          console.log('[IDB] WASM FS restored (' + files.length + ' files)');
        }).catch(function(e) { console.warn('[IDB] FS restore failed', e); });

        // ディスク復元（確認ダイアログ）
        idbRestoreAll().then(function(entries) {
          if (!entries.length) return;
          var msg = entries.length + ' 件の保存済みディスクがあります。復元しますか？\n' +
            entries.map(function(e) {
              return '  ' + DRIVE_LABELS[e.drive] + ': ' + e.name;
            }).join('\n');
          if (!confirm(msg)) return;
          entries.forEach(function(e) {
            if (e.drive < 0 || e.drive >= 4) return;
            customDisks[e.drive] = e.data;
            diskNames[e.drive]   = e.name;
            document.getElementById('dn-' + e.drive).textContent = e.name;
            applyOneDisk(e.drive);
          });
          for (var d = 0; d < 4; d++) updateDirtyBtn(d);
        }).catch(function(e) { console.warn('[IDB] restore failed', e); });
      }, 200);
    }
  };
  </script>
  <script src="sim.js"></script>
</body>
</html>
