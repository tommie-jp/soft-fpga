<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>02-traffic-fsm — rtlscope</title>
  <style>
    body { background:#1a1a1a; color:#eee; font-family:monospace; margin:20px; }
    h2   { margin:0 0 12px; font-size:16px; color:#aaa; }
    .controls { display:flex; align-items:center; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
    button { background:#2a2a2a; color:#eee; border:1px solid #555; padding:4px 14px; cursor:pointer; }
    button:hover { background:#3a3a3a; }
    #btn-ped { border-color:#00b0ff; color:#00b0ff; }
    #btn-ped:hover { background:#003a55; }
    label { font-size:12px; color:#aaa; }
    #cycle-info { font-size:12px; color:#666; }
    canvas { display:block; border:1px solid #333; }
    .bottom-row { display:flex; gap:12px; align-items:flex-start; margin-top:8px; }
    #reg-panel {
      border:1px solid #333; padding:10px 16px;
      font-size:13px; line-height:1.9; color:#ccc; min-width:160px;
    }
    #reg-panel .val { color:#eee; }
    #reg-panel .label { color:#666; }
  </style>
</head>
<body>
  <h2>02-traffic-fsm</h2>
  <div class="controls">
    <button id="btn-run">Run</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-ped">🚶 歩行者ボタン</button>
    <label>速度: <input id="speed" type="range" min="1" max="300" value="30"></label>
    <span id="cycle-info">0 cycles</span>
  </div>

  <!-- State Diagram -->
  <canvas id="sd" width="520" height="200"></canvas>

  <div class="bottom-row">
    <!-- Register Panel -->
    <div id="reg-panel">
      <div><span class="label">State   : </span><span class="val" id="r-state">-</span></div>
      <div><span class="label">Timer   : </span><span class="val" id="r-timer">-</span></div>
      <div><span class="label">btn_req : </span><span class="val" id="r-btnreq">-</span></div>
    </div>
    <!-- Logic Analyzer -->
    <canvas id="la" width="360" height="240"></canvas>
  </div>

  <script>
  // ── 定数 ────────────────────────────────────────────────
  const STATE_NAMES  = ['GREEN', 'YELLOW', 'RED', 'WALK'];
  const STATE_COLORS = ['#00c853', '#ffd600', '#ff1744', '#00b0ff'];

  // ring buffer ビットレイアウト（harness.cpp と一致させる）
  const BIT_STATE   = 0;   // bits[1:0]
  const BIT_GREEN   = 2;
  const BIT_YELLOW  = 3;
  const BIT_RED     = 4;
  const BIT_WALK    = 5;
  const BIT_BTNREQ  = 6;
  const BIT_RST     = 7;
  const BIT_CLK     = 8;
  const BIT_TIMER   = 16;  // bits[25:16]

  const BIT_BTN    = 9;

  // Logic Analyzer の信号定義
  // type:'bit'   → 0/1 の矩形波
  // type:'bus'   → 値をアナログ風（高さで表現）の波形
  // type:'state' → 状態名ラベル付きバス
  const LA_SIGNALS = [
    { label: 'clk',     bit: BIT_CLK,    type: 'bit', color: '#888888' },
    { label: 'rst',     bit: BIT_RST,    type: 'bit', color: '#ff8888' },
    { label: 'btn',     bit: BIT_BTN,    type: 'bit', color: '#aaaaff' },
    { label: 'red',     bit: BIT_RED,    type: 'bit', color: '#ff4444' },
    { label: 'yellow',  bit: BIT_YELLOW, type: 'bit', color: '#ffdd00' },
    { label: 'green',   bit: BIT_GREEN,  type: 'bit', color: '#44dd44' },
    { label: 'walk',    bit: BIT_WALK,   type: 'bit', color: '#00ccff' },
    { label: 'state',   bit: BIT_STATE,  type: 'state', width: 2, color: '#cc88ff' },
    { label: 'timer',   bit: BIT_TIMER,  type: 'bus',   width: 10, max: 512, color: '#00ccff' },
    { label: 'btn_req', bit: BIT_BTNREQ, type: 'bit', color: '#ffaa00' },
  ];

  // ── State Diagram 描画 ──────────────────────────────────
  // ノード座標 [x, y] （canvas 520×200）
  const ND = [
    [80,  100],  // 0: GREEN
    [240, 100],  // 1: YELLOW
    [400,  50],  // 2: RED
    [400, 150],  // 3: WALK
  ];
  const R = 30;  // ノード半径

  function drawArrow(ctx, x1, y1, x2, y2, color) {
    const a = Math.atan2(y2 - y1, x2 - x1);
    const hLen = 8;
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hLen * Math.cos(a - Math.PI / 6), y2 - hLen * Math.sin(a - Math.PI / 6));
    ctx.lineTo(x2 - hLen * Math.cos(a + Math.PI / 6), y2 - hLen * Math.sin(a + Math.PI / 6));
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  }

  function drawCurvedArrow(ctx, x1, y1, cpx, cpy, x2, y2, color) {
    const hLen = 8;
    const a = Math.atan2(y2 - cpy, x2 - cpx);
    ctx.strokeStyle = color; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1);
    ctx.quadraticCurveTo(cpx, cpy, x2, y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hLen * Math.cos(a - Math.PI / 6), y2 - hLen * Math.sin(a - Math.PI / 6));
    ctx.lineTo(x2 - hLen * Math.cos(a + Math.PI / 6), y2 - hLen * Math.sin(a + Math.PI / 6));
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
  }

  function arrowEdge(i, j) {
    // ノード i → j の境界点を返す [sx,sy, ex,ey]
    const [x1,y1] = ND[i], [x2,y2] = ND[j];
    const a = Math.atan2(y2 - y1, x2 - x1);
    return [x1 + R*Math.cos(a), y1 + R*Math.sin(a),
            x2 - R*Math.cos(a), y2 - R*Math.sin(a)];
  }

  function drawStateDiagram(ctx, currentState) {
    ctx.clearRect(0, 0, 520, 200);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, 520, 200);

    const arrowColor = '#555';

    // 矢印を先に描く（ノードの下）
    // GREEN → YELLOW
    { const [sx,sy,ex,ey] = arrowEdge(0,1); drawArrow(ctx,sx,sy,ex,ey,arrowColor); }
    // YELLOW → RED
    { const [sx,sy,ex,ey] = arrowEdge(1,2); drawArrow(ctx,sx,sy,ex,ey,arrowColor); }
    // YELLOW → WALK
    { const [sx,sy,ex,ey] = arrowEdge(1,3); drawArrow(ctx,sx,sy,ex,ey,arrowColor); }
    // RED → GREEN（上を迂回する曲線）
    drawCurvedArrow(ctx, ND[2][0]-R, ND[2][1], 240, 8, ND[0][0], ND[0][1]-R, arrowColor);
    // WALK → GREEN（下を迂回する曲線）
    drawCurvedArrow(ctx, ND[3][0]-R, ND[3][1], 240, 192, ND[0][0], ND[0][1]+R, arrowColor);

    // ノードを描く
    for (let i = 0; i < 4; i++) {
      const [x, y] = ND[i];
      const active = (i === currentState);
      ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2);
      ctx.fillStyle   = active ? STATE_COLORS[i] : '#252525';
      ctx.strokeStyle = active ? STATE_COLORS[i] : '#444';
      ctx.lineWidth   = active ? 2.5 : 1.5;
      ctx.fill(); ctx.stroke();
      ctx.fillStyle    = active ? '#000' : '#777';
      ctx.font         = 'bold 11px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(STATE_NAMES[i], x, y);
    }
  }

  // ── Logic Analyzer 描画 ────────────────────────────────
  const LA_H     = 240;
  const LA_W     = 360;
  const LABEL_W  = 44;
  const VIEW_W   = LA_W - LABEL_W;
  const TRACK_H  = LA_H / LA_SIGNALS.length;

  function drawLA(ctx, heapu32, ringBase, head, ringSize) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, LA_W, LA_H);

    const samples   = Math.min(head, VIEW_W, ringSize);
    const startSamp = head - samples;

    for (let t = 0; t < LA_SIGNALS.length; t++) {
      const sig   = LA_SIGNALS[t];
      const yBase = t * TRACK_H;

      // 区切り線
      ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, yBase + TRACK_H); ctx.lineTo(LA_W, yBase + TRACK_H);
      ctx.stroke();

      // ラベル
      ctx.fillStyle = '#555'; ctx.font = '11px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(sig.label, 4, yBase + TRACK_H * 0.65);

      if (samples === 0) continue;

      ctx.strokeStyle = sig.color; ctx.lineWidth = 1.5;
      ctx.beginPath();

      if (sig.type === 'bit') {
        // 0/1 矩形波
        const yHigh = yBase + 4;
        const yLow  = yBase + TRACK_H - 4;
        const firstIdx = startSamp & (ringSize - 1);
        const firstVal = (heapu32[ringBase + firstIdx] >> sig.bit) & 1;
        ctx.moveTo(LABEL_W, firstVal ? yHigh : yLow);
        for (let i = 0; i < samples; i++) {
          const idx = (startSamp + i) & (ringSize - 1);
          const val = (heapu32[ringBase + idx] >> sig.bit) & 1;
          const x   = LABEL_W + i;
          const y   = val ? yHigh : yLow;
          ctx.lineTo(x, y);
          ctx.lineTo(x + 1, y);
        }
      } else if (sig.type === 'bus') {
        // bus: アナログ風（値の高さで表現）
        const MASK     = (1 << sig.width) - 1;
        const yTop     = yBase + 3;
        const yBottom  = yBase + TRACK_H - 3;
        const yRange   = yBottom - yTop;
        const toY = v => yBottom - (v / sig.max) * yRange;

        const firstIdx = startSamp & (ringSize - 1);
        const firstVal = (heapu32[ringBase + firstIdx] >> sig.bit) & MASK;
        ctx.moveTo(LABEL_W, toY(firstVal));
        for (let i = 0; i < samples; i++) {
          const idx = (startSamp + i) & (ringSize - 1);
          const val = (heapu32[ringBase + idx] >> sig.bit) & MASK;
          ctx.lineTo(LABEL_W + i, toY(val));
        }
        // 現在値をラベル右に表示
        const lastIdx = (startSamp + samples - 1) & (ringSize - 1);
        const lastVal = (heapu32[ringBase + lastIdx] >> sig.bit) & MASK;
        ctx.fillStyle = sig.color; ctx.font = '10px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(lastVal, LABEL_W + samples + 2, yBase + TRACK_H * 0.65);
      } else {
        // state: 状態名ラベル付きバス（ハイ固定線 + 遷移時に縦線 + 中央に状態名）
        const MASK   = (1 << sig.width) - 1;
        const yTop   = yBase + 4;
        const yMid   = yBase + TRACK_H / 2;
        const yBot   = yBase + TRACK_H - 4;

        let prevVal = (heapu32[ringBase + (startSamp & (ringSize - 1))] >> sig.bit) & MASK;
        let segStart = LABEL_W;
        const segments = [];  // {x, w, val}

        for (let i = 1; i < samples; i++) {
          const idx = (startSamp + i) & (ringSize - 1);
          const val = (heapu32[ringBase + idx] >> sig.bit) & MASK;
          if (val !== prevVal) {
            segments.push({ x: segStart, w: LABEL_W + i - segStart, val: prevVal });
            segStart = LABEL_W + i;
            prevVal = val;
          }
        }
        segments.push({ x: segStart, w: LABEL_W + samples - segStart, val: prevVal });

        for (const seg of segments) {
          // 上下の水平線
          ctx.strokeStyle = sig.color; ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(seg.x, yTop); ctx.lineTo(seg.x + seg.w, yTop); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(seg.x, yBot); ctx.lineTo(seg.x + seg.w, yBot); ctx.stroke();
          // 左右の縦線
          ctx.beginPath();
          ctx.moveTo(seg.x, yTop); ctx.lineTo(seg.x, yBot); ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(seg.x + seg.w, yTop); ctx.lineTo(seg.x + seg.w, yBot); ctx.stroke();
          // 状態名（幅が十分なら）
          const name = STATE_NAMES[seg.val] || String(seg.val);
          ctx.fillStyle = sig.color; ctx.font = '9px monospace';
          ctx.textAlign = 'center';
          const cx = seg.x + seg.w / 2;
          if (seg.w > name.length * 6) {
            ctx.fillText(name, cx, yMid + 3);
          }
        }
        ctx.strokeStyle = sig.color;  // stroke() below is a no-op for state type
      }
      ctx.stroke();
    }
  }

  // ── メイン ──────────────────────────────────────────────
  var Module = {
    onRuntimeInitialized: function () {
      Module._sim_init();

      const sdCanvas = document.getElementById('sd');
      const sdCtx    = sdCanvas.getContext('2d');
      const laCanvas = document.getElementById('la');
      const laCtx    = laCanvas.getContext('2d');

      const RING_SIZE = Module._get_ring_size();
      const ringBase  = Module._get_ring_ptr() >>> 2;  // byte → uint32 index

      let running = false;

      function loop() {
        if (running) {
          const steps = parseInt(document.getElementById('speed').value);
          for (let i = 0; i < steps; i++) Module._step();
        }

        const head    = Module._get_head() >>> 0;
        const heapu32 = Module.HEAPU32;

        // 最新サンプルを読む
        const latestIdx = head > 0 ? (head - 1) & (RING_SIZE - 1) : 0;
        const latest    = head > 0 ? heapu32[ringBase + latestIdx] : 0;
        const state     = (latest >> BIT_STATE)  & 0x3;
        const timer     = (latest >> BIT_TIMER)  & 0x3FF;
        const btnreq    = (latest >> BIT_BTNREQ) & 0x1;

        // State Diagram
        drawStateDiagram(sdCtx, head > 0 ? state : -1);

        // Register Panel
        document.getElementById('r-state').textContent  = head > 0 ? STATE_NAMES[state] : '-';
        document.getElementById('r-timer').textContent  = head > 0 ? timer : '-';
        document.getElementById('r-btnreq').textContent = head > 0 ? btnreq : '-';

        // Logic Analyzer
        drawLA(laCtx, heapu32, ringBase, head, RING_SIZE);

        document.getElementById('cycle-info').textContent = head + ' cycles';

        requestAnimationFrame(loop);
      }

      document.getElementById('btn-run').addEventListener('click', function () {
        running = !running;
        this.textContent = running ? 'Pause' : 'Run';
      });

      document.getElementById('btn-reset').addEventListener('click', function () {
        Module._reset_sim();
        running = false;
        document.getElementById('btn-run').textContent = 'Run';
      });

      document.getElementById('btn-ped').addEventListener('click', function () {
        Module._press_btn();
      });

      requestAnimationFrame(loop);
    }
  };
  </script>
  <script src="sim.js"></script>
</body>
</html>
