name: sfa

x-base: &base
  image: sfa-dev:local
  build:
    context: .
    dockerfile: Dockerfile
    args:
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
  volumes:
    - ../:/work
    - sfa-ccache:/ccache
  working_dir: /work
  environment:
    - CCACHE_DIR=/ccache

services:
  dev:
    <<: *base
    tty: true
    stdin_open: true
    command: ["bash"]

  build-sim:
    # examples/<EXAMPLE> をネイティブ Linux バイナリ (build/sim) にビルドする。
    # scripts/build-sim.sh から EXAMPLE 環境変数で呼び出す。
    <<: *base
    init: true
    entrypoint: ["scripts/_build-sim-inner.sh"]
    command: []

  dormann:
    # Klaus Dormann 6502 機能テストをネイティブで実行する。
    <<: *base
    command: ["bash", "-c", "verif/dormann/run.sh"]

  wozmon:
    # Woz Monitor インテグレーションテストをネイティブで実行する。
    <<: *base
    command: ["bash", "-c", "verif/wozmon/run.sh"]

  test-cocotb:
    # cocotb + pytest による RTL 単体回帰テスト。
    # scripts/test-cocotb.sh または直接 docker compose run test-cocotb で実行。
    <<: *base
    entrypoint: ["scripts/_test-cocotb-inner.sh"]
    command: []

  build-wasm:
    # WASM ビルド (Verilator + Emscripten)。
    # scripts/build-wasm-06.sh などを直接呼び出す。
    image: sfa-dev-wasm:local
    build:
      context: .
      dockerfile: Dockerfile.wasm
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    volumes:
      - ../:/work
      - sfa-ccache:/ccache
    working_dir: /work
    init: true
    entrypoint: ["bash", "-c"]
    command: ["scripts/build-wasm-06.sh"]

volumes:
  sfa-ccache:
