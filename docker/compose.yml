name: sfa

x-base: &base
  image: sfa-dev:local
  build:
    context: .
    dockerfile: Dockerfile
    args:
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
  volumes:
    - ../:/work
    - sfa-ccache:/ccache
  working_dir: /work
  environment:
    - CCACHE_DIR=/ccache

services:
  dev:
    <<: *base
    tty: true
    stdin_open: true
    command: ["bash"]

  build-sim:
    # examples/<EXAMPLE> をネイティブ Linux バイナリ (build/sim) にビルドする。
    # scripts/build-sim.sh から EXAMPLE 環境変数で呼び出す。
    <<: *base
    init: true
    entrypoint: ["scripts/_build-sim-inner.sh"]
    command: []

  dormann:
    # Klaus Dormann 6502 機能テストをネイティブで実行する。
    <<: *base
    command: ["bash", "-c", "verif/dormann/run.sh"]

volumes:
  sfa-ccache:
